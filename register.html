<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Rent-a-Car</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="register-page">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="../index.html">
          <i class="bi bi-car-front-fill me-2"></i>
          Rent-a-Car
        </a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="login.html"
            >Already have an account? Login</a
          >
        </div>
      </div>
    </nav>

    <!-- Register Form -->
    <div class="container mt-5 py-4">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          <div class="card fade-in">
            <div class="card-header text-center py-3">
              <h4 class="mb-0">
                <i class="bi bi-person-plus-fill me-2"></i>
                Create Your Account
              </h4>
            </div>
            <div class="card-body px-4 py-4">
              <form id="registerForm">
                <div class="mb-3">
                  <label for="name" class="form-label">Full Name</label>
                  <input type="text" class="form-control form-control-lg" id="name" required autocomplete="name" />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input type="email" class="form-control form-control-lg" id="email" required autocomplete="email" />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control form-control-lg" id="password" required minlength="6" autocomplete="new-password" />
                </div>
                <div class="mb-3">
                  <label for="role" class="form-label">Role</label>
                  <select class="form-select form-select-lg" id="role" required>
                    <option value="">Select Role</option>
                    <option value="user">Customer</option>
                    <option value="agent">Car Agent</option>
                    <option value="admin">Administrator</option>
                  </select>
                  <small class="form-text text-muted d-block mt-1">
                    Note: Agent and Admin accounts require approval from an existing admin.
                  </small>
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-person-plus-fill me-2"></i>
                    Register
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
