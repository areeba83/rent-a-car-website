<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Rent-a-Car</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="../index.html">
          <i class="bi bi-car-front-fill me-2"></i>
          Rent-a-Car
        </a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="register.html"
            >Don't have an account? Register</a
          >
        </div>
      </div>
    </nav>

    <!-- Login Form -->
    <div class="container mt-5 py-4">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
          <div class="card fade-in">
            <div class="card-header text-center py-3">
              <h4 class="mb-0">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Login to Your Account
              </h4>
            </div>
            <div class="card-body px-4 py-4">
              <form id="loginForm">
                <div class="mb-3">
                  <label for="email" class="form-label">Email Address</label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    id="email"
                    required
                    autocomplete="email"
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="password"
                    required
                    autocomplete="current-password"
                  />
                </div>
                <div class="mb-3">
                  <label for="role" class="form-label">Role</label>
                  <select class="form-select form-select-lg" id="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Administrator</option>
                    <option value="agent">Car Agent</option>
                    <option value="user">Customer</option>
                  </select>
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Login
                  </button>
                </div>
              </form>
              <div class="accordion accordion-flush mt-3" id="demoAccordion">
                <div class="accordion-item border-0 bg-transparent">
                  <h2 class="accordion-header">
                    <button
                      class="accordion-button collapsed py-2 px-0 bg-transparent text-secondary shadow-none border-0"
                      type="button"
                      data-bs-toggle="collapse"
                      data-bs-target="#demoCredentials"
                      aria-expanded="false"
                      aria-controls="demoCredentials"
                    >
                      <small
                        ><i class="bi bi-info-circle me-2"></i>Use demo
                        account</small
                      >
                    </button>
                  </h2>
                  <div
                    id="demoCredentials"
                    class="accordion-collapse collapse"
                    data-bs-parent="#demoAccordion"
                  >
                    <div class="accordion-body px-0 pt-0 small text-muted">
                      <div class="mb-1">
                        <strong>Admin:</strong> admin@rentacar.com / admin123
                      </div>
                      <div class="mb-1">
                        <strong>Agent:</strong> agent@rentacar.com / agent123
                      </div>
                      <div>
                        <strong>User:</strong> user@rentacar.com / user123
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
